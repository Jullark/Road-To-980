<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07131f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Road 980">
  <title>Road to 980</title>
  <link rel="manifest" href="manifest.webmanifest?v=3.2">
  <link rel="stylesheet" href="styles.css?v=3.2">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <div class="brand-mark">26</div>
      <div class="brand-copy">
        <span>Mundial 2026</span>
        <strong>Road to 980</strong>
      </div>
      <button id="ownerBtn" class="owner-btn" aria-label="Modo propietario">🔒</button>
    </header>

    <main class="view-wrap">
      <section id="homeView" class="view active"></section>
      <section id="albumView" class="view"></section>
      <section id="detailView" class="view"></section>
      <section id="tradeView" class="view"></section>
      <section id="statsView" class="view"></section>
    </main>

    <nav class="bottom-nav">
      <button data-view="homeView" class="active"><span>🏠</span><b>Inicio</b></button>
      <button data-view="albumView"><span>🌎</span><b>Álbum</b></button>
      <button data-view="tradeView"><span>🤝</span><b>Trade</b></button>
      <button data-view="statsView"><span>📊</span><b>Stats</b></button>
    </nav>
  </div>

  <div id="pinModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-icon">🔒</div>
      <h2>Modo propietario</h2>
      <p>Ingresa el PIN para editar tu colección.</p>
      <input id="pinInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="new-password" autocorrect="off" spellcheck="false" placeholder="••••">
      <div class="modal-actions">
        <button id="cancelPin" class="ghost">Cancelar</button>
        <button id="unlockPin" class="primary">Desbloquear</button>
      </div>
    </div>
  </div>



  <div id="statusSheet" class="sheet hidden" aria-hidden="true">
    <div id="sheetBackdrop" class="sheet-backdrop"></div>
    <div class="sheet-card">
      <div class="sheet-handle"></div>
      <h2 id="sheetTitle">Sticker</h2>
      <p id="sheetSubtitle">Estado actual</p>
      <div class="status-actions">
        <button data-status="owned" class="status-action owned-action"><strong>🟢 Tengo</strong><span>Está en tu álbum</span></button>
        <button data-status="missing" class="status-action missing-action"><strong>🔴 Falta</strong><span>Lo necesitas</span></button>
        <button data-status="duplicate" class="status-action duplicate-action"><strong>🔵 Duplicado</strong><span>Lo tienes para cambiar</span></button>
      </div>
      <button id="cancelStatus" class="sheet-cancel">Cancelar</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="data.js?v=3.2"></script>
  <script src="app.js?v=3.2"></script>
</body>
</html>
